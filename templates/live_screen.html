<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE — {{ competition.name }}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; font-family:'Arial Black',Arial,sans-serif; color:#fff; min-height:100vh; overflow:hidden; }

.header {
  display:grid; grid-template-columns:1fr auto 1fr;
  align-items:center; padding:20px 40px 10px;
  border-bottom:1px solid #1a1a1a;
}
.comp-name { font-size:32px; font-weight:900; letter-spacing:6px; color:#c9a84c; text-transform:uppercase; }
.wsm-logo { height:60px; opacity:0.8; }
.live-badge {
  text-align:right; display:flex; align-items:center; gap:10px; justify-content:flex-end;
}
.live-dot { width:10px; height:10px; background:#ff4444; border-radius:50%; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.live-text { font-size:12px; letter-spacing:4px; color:#ff4444; font-weight:700; }
.clock { font-size:18px; letter-spacing:3px; color:#555; }

.div-tabs { display:flex; gap:0; border-bottom:1px solid #1a1a1a; padding:0 40px; }
.div-tab {
  padding:12px 24px; font-size:11px; letter-spacing:3px; color:#555; cursor:pointer;
  border-bottom:2px solid transparent; text-transform:uppercase; transition:all 0.2s;
}
.div-tab.active { color:#c9a84c; border-bottom-color:#c9a84c; }

.main { display:grid; grid-template-columns:1fr 1fr; gap:0; height:calc(100vh - 140px); }

/* LEFT — Current discipline + on stage */
.left-panel { border-right:1px solid #1a1a1a; padding:30px 40px; display:flex; flex-direction:column; gap:20px; }
.panel-label { font-size:9px; letter-spacing:4px; color:#555; text-transform:uppercase; }
.discipline-name { font-size:36px; font-weight:900; letter-spacing:4px; color:#fff; text-transform:uppercase; margin-top:4px; }

.on-stage {
  background:linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
  border:1px solid #c9a84c; border-radius:6px; padding:24px 28px; margin-top:10px;
}
.on-stage .label { font-size:9px; letter-spacing:4px; color:#c9a84c; margin-bottom:12px; }
.on-stage .athlete-name { font-size:42px; font-weight:900; letter-spacing:3px; text-transform:uppercase; line-height:1; }
.on-stage .athlete-country { font-size:16px; color:#888; letter-spacing:4px; margin-top:8px; }
.on-stage .athlete-lot { font-size:80px; font-weight:900; color:rgba(201,168,76,0.2); position:absolute; right:28px; top:20px; line-height:1; }

.next-up { margin-top:10px; }
.next-athlete {
  display:flex; align-items:center; gap:16px; padding:14px 0;
  border-bottom:1px solid #111;
}
.next-lot { font-size:28px; font-weight:900; color:#333; width:40px; }
.next-lot.upcoming { color:#c9a84c; }
.next-name { font-size:18px; font-weight:700; letter-spacing:2px; }
.next-country { font-size:11px; color:#555; letter-spacing:2px; margin-top:2px; }
.next-badge {
  margin-left:auto; font-size:9px; letter-spacing:2px; padding:3px 8px;
  border-radius:2px; font-weight:700;
}
.next-badge.on-deck { background:rgba(201,168,76,0.15); color:#c9a84c; border:1px solid #c9a84c; }
.next-badge.in-hole { background:#111; color:#555; border:1px solid #222; }

/* RIGHT — Full start order */
.right-panel { padding:20px 30px; overflow-y:auto; }
.disc-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.disc-tab {
  padding:6px 14px; font-size:10px; letter-spacing:2px; color:#555;
  border:1px solid #1a1a1a; border-radius:3px; cursor:pointer; text-transform:uppercase;
}
.disc-tab.active { color:#c9a84c; border-color:#c9a84c; }

.order-table { width:100%; border-collapse:collapse; }
.order-table th { font-size:9px; letter-spacing:3px; color:#444; padding:8px 10px; text-align:left; border-bottom:1px solid #111; }
.order-table td { padding:12px 10px; border-bottom:1px solid #0d0d0d; font-size:14px; }
.order-table tr.current { background:rgba(201,168,76,0.08); }
.order-table tr.current td { color:#c9a84c; }
.order-table .num { font-size:22px; font-weight:900; color:#333; width:40px; }
.order-table tr.current .num { color:#c9a84c; }
.order-table .flag { font-size:20px; width:30px; }
.order-table .done { color:#333 !important; text-decoration:line-through; }

/* QR */
.qr-corner { position:fixed; bottom:20px; right:20px; text-align:center; }
.qr-corner img { width:90px; height:90px; opacity:0.4; }
.qr-corner p { font-size:8px; letter-spacing:2px; color:#333; margin-top:4px; }

/* Stars */
.stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
.star { position:absolute; width:1px; height:1px; background:#c9a84c; border-radius:50%; animation:twinkle 4s infinite; }
@keyframes twinkle { 0%,100%{opacity:0.05} 50%{opacity:0.3} }
.header,.div-tabs,.main { position:relative; z-index:1; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="header">
  <div class="comp-name">{{ competition.name }}</div>
  <img src="https://ranking.worldstrongman.org/static/wsm_logo.png" class="wsm-logo" />
  <div class="live-badge">
    <div class="live-dot"></div>
    <div class="live-text">LIVE</div>
    <div class="clock" id="clock"></div>
  </div>
</div>

<div class="div-tabs" id="div-tabs"></div>

<div class="main">
  <div class="left-panel" id="left-panel">
    <div style="color:#333;letter-spacing:3px;font-size:13px;">LOADING...</div>
  </div>
  <div class="right-panel" id="right-panel">
    <div class="disc-tabs" id="disc-tabs"></div>
    <table class="order-table">
      <thead><tr>
        <th>#</th><th></th><th>ATHLETE</th><th>COUNTRY</th><th>BIB</th>
      </tr></thead>
      <tbody id="order-tbody"></tbody>
    </table>
  </div>
</div>

<div class="qr-corner">
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&color=c9a84c&bgcolor=000000&data=https://ranking.worldstrongman.org/competitions/{{ competition.id }}/page" />
  <p>SCAN FOR RESULTS</p>
</div>

<script>
const competitionId = '{{ competition.id }}';
let data = null;
let currentDivIdx = 0;
let currentDiscIdx = 0;
let currentStartPos = 1; // кто сейчас на арене

// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.animationDelay = Math.random()*4+'s';
  starsEl.appendChild(s);
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' +
    now.getMinutes().toString().padStart(2,'0');
}
updateClock();
setInterval(updateClock, 1000);

// Load data
async function loadData() {
  const res = await fetch(`/competitions/${competitionId}/live-data`);
  data = await res.json();
  renderDivTabs();
  renderDiv(currentDivIdx);
}

function renderDivTabs() {
  const el = document.getElementById('div-tabs');
  el.innerHTML = data.divisions.map((d,i) =>
    `<div class="div-tab ${i===currentDivIdx?'active':''}" onclick="switchDiv(${i})">${d.division_name}</div>`
  ).join('');
}

function switchDiv(idx) {
  currentDivIdx = idx;
  currentDiscIdx = 0;
  currentStartPos = 1;
  renderDivTabs();
  renderDiv(idx);
}

function renderDiv(divIdx) {
  const div = data.divisions[divIdx];
  if (!div) return;

  // Disc tabs
  const discTabs = document.getElementById('disc-tabs');
  discTabs.innerHTML = div.disciplines.map((d,i) =>
    `<div class="disc-tab ${i===currentDiscIdx?'active':''}" onclick="switchDisc(${i})">${d.name}</div>`
  ).join('');

  renderDisc(divIdx, currentDiscIdx);
}

function switchDisc(idx) {
  currentDiscIdx = idx;
  renderDiv(currentDivIdx);
}

function renderDisc(divIdx, discIdx) {
  const div = data.divisions[divIdx];
  const disc = div.disciplines[discIdx];
  if (!disc) return;

  const participants = div.participants;

  // Sort by start order
  const ordered = [...participants].sort((a,b) => {
    const ao = disc.start_order[a.participant_id] || 999;
    const bo = disc.start_order[b.participant_id] || 999;
    return ao - bo;
  });

  // LEFT PANEL
  const current = ordered[currentStartPos - 1];
  const next1 = ordered[currentStartPos];
  const next2 = ordered[currentStartPos + 1];

  let leftHTML = `
    <div>
      <div class="panel-label">CURRENT DISCIPLINE</div>
      <div class="discipline-name">${disc.name}</div>
    </div>
    <div class="on-stage" style="position:relative;">
      <div class="label">⚡ ON STAGE</div>
      ${current ? `
        <div class="athlete-name">${current.first_name} ${current.last_name}</div>
        <div class="athlete-country">${countryFlag(current.country)} ${current.country||''}</div>
        <div class="athlete-lot">${currentStartPos}</div>
      ` : '<div style="color:#333;letter-spacing:3px;">— WAITING —</div>'}
    </div>
    <div class="next-up">
      <div class="panel-label" style="margin-bottom:12px;">NEXT UP</div>`;

  if (next1) leftHTML += `
      <div class="next-athlete">
        <div class="next-lot upcoming">${currentStartPos+1}</div>
        <div>
          <div class="next-name">${next1.first_name} ${next1.last_name}</div>
          <div class="next-country">${countryFlag(next1.country)} ${next1.country||''}</div>
        </div>
        <div class="next-badge on-deck">ON DECK</div>
      </div>`;

  if (next2) leftHTML += `
      <div class="next-athlete">
        <div class="next-lot">${currentStartPos+2}</div>
        <div>
          <div class="next-name">${next2.first_name} ${next2.last_name}</div>
          <div class="next-country">${countryFlag(next2.country)} ${next2.country||''}</div>
        </div>
        <div class="next-badge in-hole">IN HOLE</div>
      </div>`;

  leftHTML += `</div>
    <div style="display:flex;gap:10px;margin-top:auto;">
      <button onclick="prevAthlete()" style="flex:1;padding:12px;background:#111;border:1px solid #222;color:#888;font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:3px;">◀ PREV</button>
      <button onclick="nextAthlete()" style="flex:1;padding:12px;background:#c9a84c;border:none;color:#000;font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:3px;font-weight:900;">NEXT ▶</button>
    </div>`;

  document.getElementById('left-panel').innerHTML = leftHTML;

  // RIGHT PANEL — full order table
  const tbody = document.getElementById('order-tbody');
  tbody.innerHTML = ordered.map((p, idx) => {
    const pos = idx + 1;
    const isDone = pos < currentStartPos;
    const isCurrent = pos === currentStartPos;
    return `<tr class="${isCurrent?'current':''}">
      <td class="num ${isDone?'done':''}">${pos}</td>
      <td class="flag">${countryFlag(p.country)}</td>
      <td class="${isDone?'done':''}" style="font-weight:${isCurrent?'700':'400'}">${p.first_name} ${p.last_name}</td>
      <td class="${isDone?'done':''}" style="color:#666;font-size:12px;letter-spacing:2px;">${p.country||''}</td>
      <td style="color:#444;font-size:12px;">#${p.bib_no||'—'}</td>
    </tr>`;
  }).join('');
}

function nextAthlete() {
  const div = data.divisions[currentDivIdx];
  if (currentStartPos < div.participants.length) {
    currentStartPos++;
    renderDisc(currentDivIdx, currentDiscIdx);
  }
}

function prevAthlete() {
  if (currentStartPos > 1) {
    currentStartPos--;
    renderDisc(currentDivIdx, currentDiscIdx);
  }
}

function countryFlag(code) {
  if (!code || code.length < 2) return '🏳️';
  const iso2 = {LAT:'LV',RUS:'RU',USA:'US',GBR:'GB',FIN:'FI',NOR:'NO',SWE:'SE',EST:'EE',LTU:'LT',UKR:'UA',KAZ:'KZ',BLR:'BY',POL:'PL',GER:'DE',FRA:'FR',ITA:'IT',ESP:'ES',AUS:'AU',CAN:'CA',BRA:'BR',UAE:'AE'};
  const c = iso2[code] || code.slice(0,2);
  return c.toUpperCase().replace(/./g, ch => String.fromCodePoint(0x1F1E6-65+ch.charCodeAt(0)));
}

// Auto-refresh every 30s
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
