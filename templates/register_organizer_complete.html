<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completing Registration — World Strongman</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0a; color:#fff; font-family:system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .box { text-align:center; max-width:480px; padding:48px 32px; }
    .logo { width:80px; margin-bottom:24px; }
    h1 { font-size:22px; color:#c9a84c; letter-spacing:2px; margin-bottom:12px; }
    p { color:#888; font-size:14px; line-height:1.8; }
    .spinner { width:40px; height:40px; border:3px solid #1e1e1e; border-top-color:#c9a84c; border-radius:50%; animation:spin 0.8s linear infinite; margin:24px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .success { color:#4caf50; font-size:48px; margin:16px 0; }
    .error { color:#ff5252; font-size:14px; margin-top:16px; }
    .btn { display:inline-block; margin-top:24px; padding:12px 32px; background:#c9a84c; color:#000; border-radius:3px; text-decoration:none; font-weight:700; font-size:13px; }
  </style>
</head>
<body>
  <div class="box">
    <img src="/static/logo.jpg" class="logo" />
    <div id="loading">
      <h1>COMPLETING REGISTRATION</h1>
      <div class="spinner"></div>
      <p>Processing your payment and creating your account...</p>
    </div>
    <div id="success" style="display:none">
      <div class="success">✓</div>
      <h1>WELCOME TO WSM!</h1>
      <p>Your organizer profile has been created and your annual membership is active.</p>
      <a href="https://app.ranking.worldstrongman.org/login" class="btn">LOGIN TO YOUR ACCOUNT</a>
    </div>
    <div id="error" style="display:none">
      <h1>REGISTRATION FAILED</h1>
      <p id="error-msg">Something went wrong. Please contact support.</p>
      <a href="/register/organizer" class="btn" style="background:transparent;border:1px solid #c9a84c;color:#c9a84c;">TRY AGAIN</a>
    </div>
  </div>

  <script>
  async function complete() {
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    if (!sessionId) {
      showError('Invalid session. Please try again.');
      return;
    }

    // Верифицируем оплату
    const verifyRes = await fetch('/payments/verify/' + sessionId);
    const verifyData = await verifyRes.json();
    
    if (!verifyData.paid) {
      showError('Payment not completed. Please try again.');
      return;
    }

    // Получаем данные формы из sessionStorage
    const formDataStr = sessionStorage.getItem('wsm_pending_organizer');
    if (!formDataStr) {
      showError('Session expired. Please register again.');
      return;
    }
    const formData = JSON.parse(formDataStr);

    // Создаём аккаунт
    const res = await fetch('/auth/register/organizer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({...formData, stripe_session_id: sessionId})
    });
    const data = await res.json();
    
    if (res.ok) {
      sessionStorage.removeItem('wsm_pending_organizer');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } else {
      showError(data.detail || 'Registration failed. Contact support@worldstrongman.org');
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }

  complete().catch(e => showError('Error: ' + e.message));
  </script>
</body>
</html>
