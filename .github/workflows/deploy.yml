name: Deploy to Hetzner
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/wsm-platform
            git stash
            git pull origin main
            cd /var/www/wsm-platform/frontend/referee-app
            npm run build
            cp -r dist/* /var/www/wsm-referee-app/
            cd /var/www/wsm-platform
            systemctl restart wsm-api
            echo "Deployed successfully!"
